<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>fricachai 股票觀察面板</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div id="loginGate" class="login-gate">
    <div class="login-frame">
      <svg class="login-border-svg" viewBox="0 0 420 520" preserveAspectRatio="none" aria-hidden="true">
        <defs>
          <linearGradient id="loginBorderGradient" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="420" y2="0">
            <stop offset="0%" stop-color="#ff63c8" />
            <stop offset="25%" stop-color="#ffbe72" />
            <stop offset="50%" stop-color="#7ce1ff" />
            <stop offset="75%" stop-color="#b47cff" />
            <stop offset="100%" stop-color="#ff63c8" />
            <animateTransform
              attributeName="gradientTransform"
              type="rotate"
              from="0 210 260"
              to="360 210 260"
              dur="7.2s"
              repeatCount="indefinite"
            />
          </linearGradient>
        </defs>
        <rect x="1.5" y="1.5" width="417" height="517" rx="22" ry="22" class="login-border-stroke" />
      </svg>
      <div class="login-panel">
        <h2>登入股票觀察面板</h2>
        <form id="loginForm" class="login-form">
          <input id="loginUsername" type="text" autocomplete="username" placeholder="帳號" />
          <input id="loginPassword" type="password" autocomplete="current-password" placeholder="密碼" />
          <label class="remember-me">
            <input id="rememberLogin" type="checkbox" />
            <span>記住登入狀態</span>
          </label>
          <button type="submit">登入</button>
        </form>
        <p id="loginStatus" class="login-status">請先登入後再進入面板。</p>
      </div>
    </div>
  </div>

  <div id="appShell" class="app-shell app-shell--hidden" aria-hidden="true">
    <main class="chart-panel">
      <header class="chart-header">
        <div>
          <div class="title-row">
            <h1 id="chartTitle">載入中...</h1>
            <div class="author-card">
              <span class="author-ring"></span>
              <span class="author-bubble bubble-1"></span>
              <span class="author-bubble bubble-2"></span>
              <span class="author-bubble bubble-3"></span>
              <span class="author-bubble bubble-4"></span>
              <span class="author-bubble bubble-5"></span>
              <span class="author-spark spark-1"></span>
              <span class="author-spark spark-2"></span>
              <span class="author-spark spark-3"></span>
              <span class="author-copy">程式設計：fricachai | 資訊提供：jimmy (2026/04/20)</span>
            </div>
          </div>
          <p id="closeInfo" class="close-info">今日收盤價：--</p>
        </div>
        <div class="header-actions">
          <button id="logoutButton" type="button" class="ghost-button">登出</button>
          <select id="timeframeSelect" class="ghost-select">
            <option value="1h">1小時</option>
            <option value="2h">2小時</option>
            <option value="3h">3小時</option>
            <option value="4h">4小時</option>
            <option value="1d" selected>1日</option>
          </select>
          <label class="ghost-button file-button">
            匯入 K 線 CSV
            <input id="priceFileInput" type="file" accept=".csv" hidden />
          </label>
        </div>
      </header>

      <section class="chart-stage">
        <canvas id="chartCanvas" width="1320" height="1080"></canvas>
      </section>
    </main>

    <aside class="watchlist-panel">
      <div class="watchlist-top">
        <div>
          <p class="eyebrow">右側觀察清單</p>
          <h2>股票代號 / 名稱</h2>
        </div>
        <label class="icon-button file-button">
          匯入
          <input id="watchlistFileInput" type="file" accept=".csv" hidden />
        </label>
      </div>

      <form id="stockForm" class="stock-form">
        <input id="codeInput" type="text" maxlength="12" placeholder="股票代號，例如 2330" />
        <input id="nameInput" type="text" maxlength="30" placeholder="股票名稱可留空，自動抓取" />
        <button type="submit">加入 / 抓取</button>
      </form>

      <p id="statusText" class="status-text">輸入股票代號後，系統會自動向 TWSE 官方資料抓取名稱與日 K。</p>

      <div class="watchlist-toolbar">
        <input id="searchInput" type="search" placeholder="搜尋代號或名稱" />
      </div>

      <div class="watchlist-header">
        <span>商品</span>
        <span>名稱</span>
      </div>
      <div id="watchlist" class="watchlist"></div>

      <section class="import-note">
        <h3>匯入說明</h3>
        <p>觀察清單 CSV：`code` 或 `code,name` 都可以</p>
        <p>K 線 CSV：`code,name,date,open,high,low,close,volume`</p>
        <p>同一支股票可重複匯入，系統會自動刷新圖表資料。</p>
      </section>
    </aside>
  </div>

  <script src="./app.js"></script>
</body>
</html>
